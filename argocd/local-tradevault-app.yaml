apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tradevault-local
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sagar-dave/tradevault.git
    targetRevision: main
    path: kubernetes/local

  destination:
    server: https://kubernetes.default.svc
    namespace: tradevault
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true