apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: tradevault-alerts
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
    - name: tradevault.rules
      rules:
        - alert: TradeVaultAPIDown
          expr: up{job="tradevault-api"} == 0
          for: 2m
          labels:
            severity: critical
            app: devops-app
            service: tradevault-api
          annotations:
            summary: "TradeVault API pod is down"
            description: "Prometheus cannot scrape TradeVault API pod {{ $labels.pod }} in namespace {{ $labels.namespace }}."

        - alert: TradeVaultAPIRestarting
          expr: increase(kube_pod_container_status_restarts_total{namespace="tradevault", container="tradevault-api"}[10m]) > 2
          for: 2m
          labels:
            severity: warning
            app: devops-app
            service: tradevault-api
          annotations:
            summary: "TradeVault API pod restarted"
            description: "TradeVault API pod {{ $labels.pod }} restarted within the last 10 minutes."

        - alert: TradeVaultAPIHighCPU
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="tradevault", container="tradevault-api"}[5m])) by (pod) > 0.3
          for: 5m
          labels:
            severity: warning
            app: devops-app
            service: tradevault-api
          annotations:
            summary: "TradeVault API high CPU usage"
            description: "TradeVault API pod {{ $labels.pod }} is using high CPU for more than 5 minutes."