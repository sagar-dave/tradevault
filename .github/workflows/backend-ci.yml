name: Backend CI

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-backend:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        if : github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend Docker image
        if : github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/tradevault-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/tradevault-api:${{ github.sha }}

      - name: Update Kubernetes image tag
        if : github.event_name == 'push'
        run: |
          sed -i "s|image: .*tradevault-api:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/tradevault-api:${{ github.sha }}|" kubernetes/api-deployment.yaml

      - name: Commit updated image tag
        if : github.event_name == 'push'
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add kubernetes/api-deployment.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes to commit"
          git push
