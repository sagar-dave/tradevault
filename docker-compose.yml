services:
  api:
    build:
      context: ./backend
    container_name: tradevault-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  postgres:
    image: postgres:16
    container_name: tradevault-postgres
    environment:
        POSTGRES_USER: ${POSTGRES_USER}
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: ${POSTGRES_DB}
    ports:
        - "5432:5432"
    volumes:
      - tradevault-postgres-data:/var/lib/postgresql/data

volumes:
    tradevault-postgres-data: